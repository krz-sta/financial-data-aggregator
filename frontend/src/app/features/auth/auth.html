<div class="text-white bg-black font-mono min-h-screen flex flex-col">
  <app-header />
  <main class="flex-1 flex items-center justify-center px-6 py-12 inset-[-1px] bg-[linear-gradient(to_right,#18181b_1px,transparent_1px),linear-gradient(to_bottom,#18181b_1px,transparent_1px)] [background-size:4rem_4rem]">
    <section class="w-full max-w-md bg-black p-8 border border-zinc-800">
      <div class="flex gap-px mb-8">
        <button type="button" (click)="setMode('login')" [class]="'flex-1 py-3 text-cs font-mono tracking-widest transition-colors ' +
            (authMode() === 'login' ? 'bg-white text-black' : 'bg-black text-zinc-500 hover:text-zinc-300')">
          LOG IN
        </button>
        <button type="button" (click)="setMode('signup')" [class]="'flex-1 py-3 text-cs font-mono tracking-widest transition-colors ' +
          (authMode() === 'signup' ? 'bg-white text-black' : 'bg-black text-zinc-500 hover:text-zinc-300')">
          SIGN UP
        </button>
      </div>

      <form (ngSubmit)="handleSubmit($event)" class="space-y-4">

        @if (authMode() === 'signup') {
        <div>
          <label class="block text-xs font-mono text-zinc-500 mb-2 tracking-widest">NAME</label>
          <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-zinc-600">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" name="name" (ngModel)="formData().name"
              class="w-full pl-10 pr-4 py-3 bg-black border border-zinc-800 focus:outline-none focus:border-zinc-700 text-sm text-white placeholder-zinc-600 font-mono"
              placeholder="Enter your name" [required]="authMode() === 'signup'" />
          </div>
        </div>
        }

        <div>
          <label class="block text-xs font-mono text-zinc-500 mb-2 tracking-widest">EMAIL</label>
          <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-zinc-600">
              <rect width="20" height="16" x="2" y="4" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            <input type="email" name="email" (ngModel)="formData().email"
              class="w-full pl-10 pr-4 py-3 bg-black border border-zinc-800 focus:outline-none focus:border-zinc-700 text-sm text-white placeholder-zinc-600 font-mono"
              placeholder="Enter your email" required />
          </div>
        </div>

        <div>
          <label class="block text-xs font-mono text-zinc-500 mb-2 tracking-widest">PASSWORD</label>
          <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-zinc-600">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" name="password" (ngModel)="formData().password"
              class="w-full pl-10 pr-4 py-3 bg-black border border-zinc-800 focus:outline-none focus:border-zinc-700 text-sm text-white placeholder-zinc-600 font-mono"
              placeholder="Enter your password" required />
          </div>
        </div>

        <button type="submit"
          class="mt-8 w-full py-3 bg-white text-black hover:bg-zinc-100 transition-colors text-xs font-mono tracking-widest uppercase font-bold">
          {{ authMode() === 'login' ? 'LOGIN' : 'CREATE ACCOUNT' }}
        </button>

      </form>
    </section>
  </main>
  <app-footer />
</div>
