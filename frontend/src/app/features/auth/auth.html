<div class="min-h-screen bg-slate-900 flex items-center justify-center p-4">
  <div class="bg-slate-800 border border-slate-700 p-8 rounded-2xl shadow-xl max-w-md w-full">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white mb-2">Witaj ponownie</h2>
      <p class="text-slate-400 text-sm">Wprowadź swoje dane, aby uzyskać dostęp do konta</p>
    </div>

    <form class="space-y-5" (submit)="$event.preventDefault()">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Adres E-mail</label>
        <input type="email" placeholder="name@example.com" 
               class="w-full p-3 rounded-xl bg-slate-900/50 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Hasło</label>
        <input type="password" placeholder="••••••••" 
               class="w-full p-3 rounded-xl bg-slate-900/50 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition">
      </div>

      <button type="button" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-xl font-semibold transition shadow-lg shadow-blue-600/20">
        Zaloguj się
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-slate-400">
      Nie masz konta? <button class="text-blue-400 hover:underline">Zarejestruj się</button>
    </div>
  </div>
</div>
