<header class="bg-black border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex flex-wrap sm:flex-nowrap items-center justify-between w-full gap-y-4">

            <div routerLink="/" class="flex items-center gap-3 w-1/2 sm:w-1/3 hover:cursor-pointer">
                <div class="w-6 h-6 border border-white flex items-center justify-center shrink-0">
                    <svg lucideTrendingUp class="w-3.5 h-3.5 text-white"></svg>
                </div>
                <span class="text-sm font-mono text-white tracking-widest hidden sm:inline-block">fin<span class="text-zinc-400">.</span>data</span>
            </div>

            <div class="flex justify-center w-full order-last sm:order-none sm:w-1/3">
                @if (!isAuthPage()) {
                    <div class="relative w-full max-w-md">
                        <svg lucideSearch class="absolute left-3 top-1/2 transform -translate-y-1/2 w-3.5 h-3.5 text-zinc-600"></svg>
                        <input
                            type="text"
                            [value]="marketService.searchQuery()"
                            (input)="marketService.searchQuery.set($any($event.target).value)"
                            placeholder="Search market..."
                            class="w-full pl-9 pr-3 py-2 bg-black border border-zinc-800 focus:outline-none focus:border-zinc-700 text-sm text-white placeholder-zinc-600 font-mono"
                        />
                        @if (marketService.searchQuery() && searchResults().length > 0) {
                            <div class="absolute top-full left-0 w-full mt-2 bg-black border border-zinc-800 shadow-xl z-50">
                                @for (result of searchResults(); track result.symbol) {
                                    <div class="p-3 border-b border-zinc-800 last:border-0 hover:bg-zinc-900 cursor-pointer flex justify-between items-center" 
                                         (click)="handleResultClick(result.symbol)">
                                        <span class="font-mono text-white text-sm tracking-widest font-bold">{{ result.symbol }}</span>
                                        <span class="font-mono text-zinc-500 text-xs truncate max-w-[60%] text-right">{{ result.name }}</span>
                                    </div>
                                }
                            </div>
                        }
                    </div>
                }
            </div>

            <div class="flex justify-end w-1/2 sm:w-1/3">
                @if (isLoggedIn()) {
                    <div class="flex items-center gap-4">
                        <button (click)="handleLogout()" class="px-3 sm:px-4 py-2 text-xs font-mono bg-white text-black hover:bg-zinc-100 transition-colors tracking-widest hover:cursor-pointer">
                            LOG OUT
                        </button>
                    </div>
                } @else if (isAuthPage()) {
                    <button routerLink="/" class="group px-2 sm:px-4 py-2 flex items-center justify-center gap-1 sm:gap-2 text-xs font-mono text-zinc-400 hover:text-white transition-colors tracking-widest hover:cursor-pointer">
                        <svg lucideArrowLeft class="w-4 h-4 mb-[2px] group-hover:-translate-x-1 transition-transform"></svg>
                        <p class="leading-none">GO BACK</p>
                    </button>
                } @else {
                    <div class="flex items-center gap-1 sm:gap-2">
                        <button routerLink="/auth" [queryParams]="{ mode: 'login'}" class="px-2 sm:px-4 py-2 text-xs font-mono text-zinc-400 hover:text-white transition-colors tracking-widest hover:cursor-pointer">
                            LOG IN
                        </button>
                        <button routerLink="/auth" [queryParams]="{ mode: 'signup'}" class="px-2 sm:px-4 py-2 text-xs font-mono bg-white text-black hover:bg-zinc-100 transition-colors tracking-widest hover:cursor-pointer">
                            SIGN UP
                        </button>
                    </div>
                }
            </div>
            
        </div>
    </div>
</header>
