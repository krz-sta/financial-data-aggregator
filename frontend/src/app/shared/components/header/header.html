<header class="bg-black border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center justify-between w-full">

            <div class="flex items-center gap-3 w-1/3">
                <div class="w-6 h-6 border border-white flex items-center justify-center">
                    <svg lucideTrendingUp class="w-3.5 h-3.5 text-white"></svg>
                </div>
                <span class="text-sm font-mono text-white tracking-widest">fin<span class="text-zinc-400">.</span>data</span>
            </div>

            <div class="flex justify-center w-1/3">
                @if (!isAuthPage()) {
                    <div class="relative w-full max-w-md">
                        <svg lucideSearch class="absolute left-3 top-1/2 transform -translate-y-1/2 w-3.5 h-3.5 text-zinc-600"></svg>
                        <input
                            type="text"
                            placeholder="Search markets"
                            class="w-full pl-9 pr-3 py-2 bg-black border border-zinc-800 focus:outline-none focus:border-zinc-700 text-sm text-white placeholder-zinc-600 font-mono"
                        />
                    </div>
                }
            </div>

            <div class="flex justify-end w-1/3">
                @if (isLoggedIn()) {
                    <div class="flex items-center gap-2">
                        @if (!isHomePage()) {
                            <button routerLink="/home" class="px-4 py-2 text-xs font-mono text-zinc-400 hover:text-white transition-colors tracking-widest">
                                DASHBOARD
                            </button>
                        }
                        <button (click)="handleLogout()" class="px-4 py-2 text-xs font-mono bg-zinc-900 text-zinc-400 border border-zinc-800 hover:border-zinc-700 hover:text-white transition-colors tracking-widest uppercase">
                            LOG OUT
                        </button>
                    </div>
                } @else if (isAuthPage()) {
                    <button routerLink="/" class="group px-4 py-2 flex items-center justify-center gap-2 text-xs font-mono text-zinc-400 hover:text-white transition-colors tracking-widest">
                        <svg lucideArrowLeft class="w-4 h-4 mb-[2px] group-hover:-translate-x-1 transition-transform"></svg>
                        <p class="leading-none">GO BACK</p>
                    </button>
                } @else {
                    <div class="flex items-center gap-2">
                        <button routerLink="/auth" [queryParams]="{ mode: 'login'}" class="px-4 py-2 text-xs font-mono text-zinc-400 hover:text-white transition-colors tracking-widest">
                            LOG IN
                        </button>
                        <button routerLink="/auth" [queryParams]="{ mode: 'signup'}" class="px-4 py-2 text-xs font-mono bg-white text-black hover:bg-zinc-100 transition-colors tracking-widest">
                            SIGN UP
                        </button>
                    </div>
                }
            </div>
            
        </div>
    </div>
</header>
