services: 
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
  
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    image: ghcr.io/krz-sta/financial-data-aggregator-backend:latest
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=5432
      - ROUTER_PORT=8080
      - ROUTER_HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis    
      - REDIS_PORT=6379     
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.backend.rule=(Host(`twojadomena.pl`) || Host(`www.twojadomena.pl`)) && PathPrefix(`/api`)" # ZMIEŃ NA SWOJĄ DOMENĘ
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
    networks:
      - default
      - proxy
    restart: unless-stopped

  frontend:
    image: ghcr.io/krz-sta/financial-data-aggregator-frontend:latest
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.frontend.rule=Host(`twojadomena.pl`) || Host(`www.twojadomena.pl`)" # ZMIEŃ NA SWOJĄ DOMENĘ
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - proxy
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json # Żeby watchtower mógł pobierać z GHCR
    command: --interval 60 backend frontend
    restart: unless-stopped

volumes:
  pgdata: 
  redis_data:

networks:
  proxy:
    external: true
