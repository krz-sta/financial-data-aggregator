services: 
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-devuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_DB: ${DB_NAME:-cointracker}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devuser} -d ${DB_NAME:-cointracker}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
  
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-devuser}
      - DB_PASSWORD=${DB_PASSWORD:-devpassword}
      - DB_NAME=${DB_NAME:-cointracker}
      - DB_PORT=5432
      - ROUTER_PORT=8080
      - ROUTER_HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET:-jwt-prod-key-change-me}
      - REDIS_HOST=redis    
      - REDIS_PORT=6379     
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80" # Exposing Nginx on port 80
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: 
  redis_data:
