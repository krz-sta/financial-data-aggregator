services: 
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: cointracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d cointracker"]
      interval: 3s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app:z
    environment:
      - DB_HOST=db
      - DB_USER=devuser
      - DB_PASSWORD=devpassword
      - DB_NAME=cointracker
      - DB_PORT=5432
      - ROUTER_PORT=8080
      - ROUTER_HOST=0.0.0.0
      - JWT_SECRET=jwt-dev-key-123
      - REDIS_HOST=redis    
      - REDIS_PORT=6379     
      - REDIS_PASSWORD=
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata: 
  redis_data: